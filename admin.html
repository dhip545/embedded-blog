<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理登录 — 嵌入式学习笔记</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 120px auto 0;
      padding: 40px 36px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: var(--glass-shadow);
      text-align: center;
      animation: modalSpring .55s cubic-bezier(.25,.46,.45,1.3) both;
    }
    .login-container h1 {
      font-family: var(--font-serif);
      font-size: 1.4rem; font-weight: 700;
      color: var(--text); margin-bottom: 6px;
    }
    .login-container .sub {
      font-size: .82rem; color: var(--text-dim);
      margin-bottom: 24px;
    }
    .login-container input {
      width: 100%; padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-card); color: var(--text);
      font-size: .9rem; font-family: var(--font-sans);
      margin-bottom: 16px; text-align: center;
      transition: border-color .15s;
    }
    .login-container input:focus {
      outline: none; border-color: var(--seal);
    }
    .login-container .error {
      color: var(--danger); font-size: .8rem;
      margin-bottom: 8px; min-height: 20px;
    }
    .login-container .btn-primary { width: 100%; justify-content: center; }
  </style>
</head>
<body class="page-editor">
<canvas id="codeRain" aria-hidden="true"></canvas>
<canvas id="inkParticles" aria-hidden="true"></canvas>

<nav class="navbar">
  <div class="logo"><span>&#21360;</span> 嵌入式学习笔记</div>
  <div class="nav-actions">
    <button onclick="toggleTheme()" class="theme-btn" aria-label="切换主题">&#9711;</button>
    <button onclick="location.href='index.html'">← 首页</button>
  </div>
</nav>

<div class="login-container">
  <h1>管理登录</h1>
  <div class="sub">输入密码以管理文章</div>
  <input type="password" id="password" placeholder="管理密码" autofocus>
  <div class="error" id="error"></div>
  <button class="btn-primary btn-write" onclick="login()">登录</button>
</div>

<script src="js/app.js"></script>
<script>
  async function login() {
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');
    if (!password) { errorEl.textContent = '请输入密码'; return; }

    try {
      const res = await fetch('/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.ok) {
        sessionStorage.setItem('blog_admin_token', data.token);
        location.href = 'dashboard.html';
      } else {
        errorEl.textContent = data.error || '密码错误';
      }
    } catch (e) {
      errorEl.textContent = '无法连接到服务器';
    }
  }

  // Enter 键登录
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });

  // 初始化主题
  (function() {
    const saved = localStorage.getItem('blog_theme');
    if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
</body>
</html>
